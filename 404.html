<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="robots" content="noindex">
<title>Siden finnes ikke — NextNova</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#FAF9F6;--navy:#16243A;--gold:#E0A24E;--slate:#45505F;--line:rgba(22,36,58,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--navy);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;line-height:1.6}
.wrap{max-width:520px}
.star{font-size:2.5rem;color:var(--gold);margin-bottom:1.5rem}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.5rem,9vw,4rem);line-height:1;margin-bottom:1rem}
.code{display:block;font-family:'Outfit';font-weight:500;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem}
p{color:var(--slate);font-weight:300;font-size:1.1rem;max-width:40ch;margin:0 auto 2.2rem}
.btn{display:inline-block;background:var(--navy);color:var(--paper);padding:.95rem 2.1rem;border-radius:999px;font-weight:500;text-decoration:none;transition:.25s}
.btn:hover{background:var(--gold);color:var(--navy);transform:translateY(-2px)}
.links{margin-top:1.8rem;font-size:.95rem}
.links a{color:var(--slate);text-decoration:none;margin:0 .8rem;border-bottom:1px solid var(--line);padding-bottom:2px}
.links a:hover{color:var(--navy)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="star">✦</div>
    <span class="code">Feil 404</span>
    <h1>Denne siden finnes ikke.</h1>
    <p>Lenken kan være feil eller utdatert. Men du er på rett sted for en ny, profesjonell nettside.</p>
    <a class="btn" href="/">Tilbake til forsiden</a>
    <div class="links">
      <a href="/#designeksempler">Se designeksempler</a>
      <a href="/#kontakt">Book gratis møte</a>
    </div>
  </div>
</body>
</html>
